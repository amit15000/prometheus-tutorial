name: prometheus-tutorial

services:
  # Express app: Prometheus metrics at http://app:3000/metrics (and /matrics)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prometheus-tutorial-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Scrapes the app; UI at http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus-tutorial-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_tsdb:/prometheus
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    # Image ENTRYPOINT is prometheus; use shell so wget runs (not passed as flags to prometheus)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:9090/-/ready || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Dashboards; UI at http://localhost:3001 (default admin / admin unless env overrides)
  grafana:
    image: grafana/grafana:11.4.0
    container_name: prometheus-tutorial-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  # Persist Prometheus TSDB so restarts keep historical samples
  prometheus_tsdb:
    driver: local
  # Grafana DB, users, and UI state (dashboards from disk are re-provisioned from ./grafana)
  grafana_data:
    driver: local
